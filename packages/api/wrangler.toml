name = "butchi-api"
main = "src/index.ts"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "butchi-db"
database_id = ""

# R2 Storage
[[r2_buckets]]
binding = "R2"
bucket_name = "butchi-rag"

# AI Gateway
[[ai_gateway]]
binding = "AI_GATEWAY"
gateway_id = "butchi-gateway"

# Workers AI
ai = { binding = "AI" }

# Vectorize
[[vectorize]]
binding = "VECTORIZE"
index_name = "butchi-rag-index"

# Environment variables
[vars]
ENVIRONMENT = "development"
JWT_SECRET = "dev-secret-change-in-production"
OTP_EMAIL_FROM = "noreply@butchi.dev"
